server:
  addr: ":8080"
  read_timeout: 30s
  write_timeout: 60s
  # 绑定域名（校验 Host）。仅 HTTP，暂不启用 HTTPS。
  # 为空则不校验 Host（方便本地直接用 IP 访问）。
  domains:
    - "rpc.example.com"
    - "localhost"
    - "127.0.0.1"

redis:
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  # 无 Redis 时自动降级为进程内限流/计数；本地可先 false
  enabled: false

# PostgreSQL：Token / 用户 / 计费账本。本地演示可先 false，继续用下方 YAML tokens。
database:
  enabled: false
  dsn: "postgres://postgres:postgres@127.0.0.1:5432/rpc_gateway?sslmode=disable"
  max_conns: 10
  min_conns: 1
  token_refresh: 30s

# 套餐：双限流 + 方法策略（database.enabled=false 时生效；启用 DB 后以库内 plans 为准）
# 限流对所有 token 生效（含 billing_free=true 的免费 token）
plans:
  free:
    # 1) 某 token 在某 IP 下的限流
    token_ip_rate_limit_per_second: 3
    token_ip_rate_limit_burst: 6
    # 2) 某 token 不分 IP 的全局限流
    token_rate_limit_per_second: 5
    token_rate_limit_burst: 10
    # 日成功次数上限（用量保护，与是否计费无关）
    daily_quota: 10000
    denied_methods:
      - eth_sendRawTransaction
      - personal_sendTransaction
      - debug_traceTransaction
      - debug_traceCall
  pro:
    token_ip_rate_limit_per_second: 30
    token_ip_rate_limit_burst: 60
    token_rate_limit_per_second: 50
    token_rate_limit_burst: 100
    daily_quota: 1000000
    denied_methods:
      - personal_sendTransaction
      - debug_traceTransaction

# API Token：访问路径为 http://{domain}/{token}/{chain}
tokens:
  - key: "demo-free-token"
    plan: free
    name: "demo-free"
    enabled: true
    # 免费：成功调用不计费，但仍受上述限流约束
    billing_free: true
  - key: "demo-pro-token"
    plan: pro
    name: "demo-pro"
    enabled: true
    billing_free: false

# 网络（chain）固定：访问路径 /{token}/{chain}，后期一般不增网络、只扩节点。
# 每个网络下 nodes 可 1→N：加权轮询 + 健康检查；改完配置后 SIGHUP 或 POST /admin/upstreams/reload 热更新。
chains:
  # 主网
  eth:
    name: "Ethereum Mainnet"
    nodes:
      - name: "publicnode-1"
        url: "https://ethereum.publicnode.com"
        ws_url: "wss://ethereum.publicnode.com"
        weight: 1
      # 后期主网扩到 2 个节点，直接追加即可，例如：
      # - name: "publicnode-2"
      #   url: "https://rpc.ankr.com/eth"
      #   weight: 1
  # 测试网
  sepolia:
    name: "Ethereum Sepolia"
    nodes:
      - name: "publicnode-sepolia-1"
        url: "https://ethereum-sepolia.publicnode.com"
        ws_url: "wss://ethereum-sepolia.publicnode.com"
        weight: 1

# WebSocket：与 HTTP 同路径 Upgrade；入站 RPC 与推送均按「成功次数」计量（同权）
websocket:
  enabled: true
  max_connections_per_token: 5
  max_subscriptions_per_connection: 20
  notification_bill_units: 1

health_check:
  interval: 30s
  timeout: 5s
  unhealthy_threshold: 3
  healthy_threshold: 2

billing:
  # log | redis_stream | postgres
  # 若 database.enabled=true，无论 publisher 为何都会额外写入 PostgreSQL 账本表
  publisher: log
  stream_key: "rpc:billing:events"

# 统计查询接口 /admin/stats* —— JWT 鉴权
# Token 由进程内定时任务签发并写入数据库（database.enabled=false 时写入内存）
admin:
  enabled: true
  jwt:
    secret: "change-me-admin-jwt-secret"
    issuer: "rpc-node-gateway"
    subject: "admin-stats"
    ttl: 24h
    rotate_every: 1h
    rotate_on_start: true
    revoke_previous: true   # 新签发时吊销旧 token
    cleanup_retention: 168h # 过期 7 天后清理
    log_token: true         # 本地调试打印 JWT；生产请改 false，从 DB 读取
